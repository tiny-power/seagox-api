server:
  port: 80

spring:
  autoconfigure:
    exclude:
      - org.mybatis.spring.boot.autoconfigure.MybatisAutoConfiguration
  jackson:
    time-zone: GMT+8
  mvc:
    throw-exception-if-no-handler-found: true
  resources:
     add-mappings: false
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  redis:
    host: 127.0.0.1
    port: 6379
    password: 
    jedis:
      pool:
        min-idle: 1
        max-active: 5000
        max-idle: 5000
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/assets?characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&rewriteBatchedStatements=true&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  mapper-locations: classpath*:/mapper/*.xml
  type-aliases-package: com.seagox.lowcode
  global-config.db-config.id-type: AUTO # oracle 配置INPUT
  type-handlers-package: com.seagox.lowcode.common

#oracle不加报错
#  configuration:
#    jdbc-type-for-null: 'null'

logging:
  file:
    path: /usr/logging
  pattern:
    console: "%d - %msg%n"
  level:
    com:
      seagox:
        lowcode: debug

